- route:
    id: route-654e
    description: Error Handler
    nodePrefixId: route-a06
    from:
      id: from-6dd1
      description: DLQ
      uri: direct
      parameters:
        name: dlq
      steps:
        - log:
            id: log-bf00
            message: "ERROR: ${exception}"
- route:
    id: route-c11a
    description: From Warehouse
    nodePrefixId: route-ae1
    autoStartup: true
    from:
      id: from-b6f1
      description: Command received
      uri: kamelet:kafka-not-secured-source
      parameters:
        topic: wh_commands
        bootstrapServers: kafka:9092
        autoCommitEnable: true
        consumerGroup: lightstep
      steps:
        - log:
            id: log-c7b9
            description: Log request
            message: "Received command: ${body}, current sequence: ${variable.sequence}"
        - setVariable:
            id: setVariable-61a9
            description: Set command
            name: command
            expression:
              simple:
                id: simple-965d
                expression: ${body}
        - setBody:
            id: setBody-0515
            description: Prepare message
            expression:
              groovy:
                id: groovy-bb4f
                expression: >-
                  def seq = String.format("%03d",
                  camelContext.getVariable("sequence"));

                  def length = String.format("%04d",
                  variables.command.length());


                  return String.valueOf((char)0x02)
                      .concat(seq)
                      .concat(length)
                      .concat(variables.command)
                      .concat(String.valueOf((char)0x03));
        - log:
            id: log-7190
            description: Log message
            message: "Message: ${body}"
        - to:
            id: to-bb55
            description: Call Controller
            uri: netty
            parameters:
              protocol: tcp
              host: 208.167.255.177
              port: "15003"
              disconnect: false
              keepAlive: false
              requestTimeout: "10000"
              useByteBuf: false
              autoAppendDelimiter: true
              allowDefaultCodec: true
              reuseAddress: true
        - setVariable:
            id: setVariable-048c
            description: Update sequence
            name: global:sequence
            expression:
              simple:
                id: simple-340f
                expression: ${variable.sequence} + 1
        - log:
            id: log-b944
            description: Log result
            message: "Response: ${body}, next sequence: ${variable.sequence}"
- route:
    id: route-42e3
    description: Events from JunctionBox
    nodePrefixId: route-de0
    autoStartup: false
    from:
      id: from-5b8a
      description: Event received
      uri: netty
      parameters:
        protocol: tcp
        host: 208.167.255.177
        port: "15003"
        clientMode: true
      steps:
        - log:
            id: log-63db
            message: ${body}
- routeConfiguration:
    errorHandler:
      deadLetterChannel:
        id: deadLetterChannel-3bf9
        deadLetterUri: direct:dlq
